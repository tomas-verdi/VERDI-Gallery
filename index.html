  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f2ee;
      --gold: #b8965a;
      --gray: #888;
      --transition: 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      font-weight: 200;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    /* SPLASH */
    #splash {
      position: fixed; inset: 0; z-index: 100;
      background: var(--black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #splash.hidden { opacity: 0; visibility: hidden; }
    #splash-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(42px, 10vw, 72px);
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--white);
    }
    #splash-sub {
      font-size: 9px;
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
    }

    /* GALLERY */
    #gallery {
      position: fixed; inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      opacity: 0;
      transition: opacity 0.8s ease;
    }
    #gallery.visible { opacity: 1; }

    #gallery-header {
      position: sticky; top: 0; z-index: 10;
      padding: env(safe-area-inset-top, 20px) 24px 16px;
      padding-top: max(env(safe-area-inset-top), 20px);
      background: linear-gradient(to bottom, var(--black) 60%, transparent);
      display: flex; align-items: center; justify-content: space-between;
    }
    #header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--white);
    }
    #photo-count {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gray);
      text-transform: uppercase;
    }

    /* Filters */
    #filters {
      display: flex;
      gap: 8px;
      padding: 0 24px 20px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    #filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--gray);
      font-family: 'Montserrat', sans-serif;
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 0;
      -webkit-appearance: none;
    }
    .filter-btn.active {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Grid */
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      padding: 0 2px;
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
    }

    .thumb {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      cursor: pointer;
      background: #111;
    }
    .thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
      opacity: 0;
    }
    .thumb img.loaded { opacity: 1; }
    .thumb:active img { transform: scale(1.03); }

    .thumb-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 32px 12px 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .thumb:hover .thumb-label { opacity: 1; }

    /* LIGHTBOX */
    #lightbox {
      position: fixed; inset: 0; z-index: 50;
      background: var(--black);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity var(--transition), visibility var(--transition);
    }
    #lightbox.open { opacity: 1; visibility: visible; }

    #lb-img-wrap {
      position: relative;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #lb-img {
      max-width: 100%; max-height: 100%;
      width: 100%; height: 100%;
      object-fit: contain;
      transition: opacity 0.3s ease;
    }
    #lb-img.fading { opacity: 0; }

    #lb-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: max(env(safe-area-inset-top), 20px) 20px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
      z-index: 2;
    }
    #lb-close {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--white);
      font-size: 20px;
      font-weight: 100;
      opacity: 0.8;
      background: none; border: none;
    }
    #lb-counter {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gray);
    }
    #lb-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.6);
    }

    #lb-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 20px 20px max(env(safe-area-inset-bottom), 20px);
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      z-index: 2;
      display: flex; align-items: center; justify-content: space-between;
    }
    .lb-nav {
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: var(--white);
      font-size: 22px;
      opacity: 0.6;
      transition: opacity 0.2s;
      background: none; border: none;
    }
    .lb-nav:active { opacity: 1; }
    #lb-category {
      font-size: 8px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
    }

    #empty {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 40vh;
      gap: 12px;
      color: var(--gray);
    }
    #empty.visible { display: flex; }
    #empty p {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
  </style>

  function getCategories() {
    return ['All', ...new Set(CONFIG.photos.map(p => p.category).filter(Boolean))];
  }

  function getFiltered() {
    if (activeCategory === 'All') return CONFIG.photos;
    return CONFIG.photos.filter(p => p.category === activeCategory);
  }

  function renderFilters() {
    const cats = getCategories();
    if (cats.length <= 2) { filtersEl.style.display = 'none'; return; }
    filtersEl.innerHTML = cats.map(c =>
      `<button class="filter-btn ${c === activeCategory ? 'active' : ''}" data-cat="${c}">${c === 'All' ? 'Todo' : c}</button>`
    ).join('');
    filtersEl.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        renderFilters();
        renderGrid();
      });
    });
  }

  function renderGrid() {
    filteredPhotos = getFiltered();
    grid.innerHTML = '';
    if (filteredPhotos.length === 0) { emptyEl.classList.add('visible'); return; }
    emptyEl.classList.remove('visible');
    photoCount.textContent = `${filteredPhotos.length} ${filteredPhotos.length === 1 ? 'imagen' : 'imágenes'}`;
    filteredPhotos.forEach((photo, i) => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.innerHTML = `
        <img src="${photo.src}" alt="${photo.title || ''}" loading="lazy" />
        ${photo.title ? `<div class="thumb-label">${photo.title}</div>` : ''}
      `;
      const isVideo = /\.(mp4|mov|webm)$/i.test(photo.src);
      if (isVideo) {
        const vid = div.querySelector('img');
        vid.outerHTML = `<video src="${photo.src}" muted playsinline loop autoplay style="width:100%;height:100%;object-fit:cover;display:block;"></video>`;
      } else {
        const img = div.querySelector('img');
        img.onload = () => img.classList.add('loaded');
        if (img.complete) img.classList.add('loaded');
      }
      div.addEventListener('click', () => openLightbox(i));
      grid.appendChild(div);
    });
  }

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function updateLightbox() {
    const photo = filteredPhotos[currentIndex];
    const isVideo = /\.(mp4|mov|webm)$/i.test(photo.src);
    const lbWrap = document.getElementById('lb-img-wrap');
    lbImg.classList.add('fading');
    setTimeout(() => {
      if (isVideo) {
        lbWrap.innerHTML = '<video id="lb-img" src="' + photo.src + '" controls autoplay playsinline style="max-width:100%;max-height:100%;width:auto;height:auto;"></video>';
      } else {
        lbImg.src = photo.src;
        lbImg.style.imageRendering = 'high-quality';
        lbImg.alt = photo.title || '';
        lbImg.onload = () => lbImg.classList.remove('fading');
        if (lbImg.complete) lbImg.classList.remove('fading');
      }
    }, 150);
    lbCounter.textContent = `${currentIndex + 1} / ${filteredPhotos.length}`;
    lbTitle.textContent = photo.title || '';
    lbCategory.textContent = photo.category || '';
  }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + filteredPhotos.length) % filteredPhotos.length;
    updateLightbox();
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('lb-next').addEventListener('click', () => navigate(1));

  let scale = 1, lastScale = 1, pinchStartDist = 0;
  let isSwiping = false, isPanning = false;
  let panX = 0, panY = 0, lastPanX = 0, lastPanY = 0, panStartX = 0, panStartY = 0;

  function applyTransform() {
    lbImg.style.transform = 'scale(' + scale + ') translate(' + panX + 'px, ' + panY + 'px)';
  }
  function resetTransform() {
    scale = 1; lastScale = 1; panX = 0; panY = 0; lastPanX = 0; lastPanY = 0;
    lbImg.style.transform = '';
  }

  lightbox.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      isSwiping = false; isPanning = false;
      pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    } else if (e.touches.length === 1) {
      if (scale > 1) {
        isPanning = true; isSwiping = false;
        panStartX = e.touches[0].clientX;
        panStartY = e.touches[0].clientY;
      } else {
        isSwiping = true; isPanning = false;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }
    }
  }, { passive: true });

  lightbox.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      scale = Math.min(Math.max(lastScale * (dist / pinchStartDist), 1), 4);
      applyTransform();
    } else if (e.touches.length === 1 && isPanning) {
      e.preventDefault();
      panX = lastPanX + (e.touches[0].clientX - panStartX) / scale;
      panY = lastPanY + (e.touches[0].clientY - panStartY) / scale;
      applyTransform();
    }
  }, { passive: false });

  lightbox.addEventListener('touchend', e => {
    if (e.touches.length < 2 && scale >= 1) { lastScale = scale; }
    if (isPanning) { lastPanX = panX; lastPanY = panY; isPanning = false; return; }
    if (!isSwiping || scale > 1) { isSwiping = false; return; }
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) { resetTransform(); navigate(dx < 0 ? 1 : -1); }
    else if (dy > 80 && Math.abs(dx) < 40) { resetTransform(); closeLightbox(); }
    isSwiping = false;
  }, { passive: true });

  lbImg.addEventListener('dblclick', () => {
    if (scale > 1) { resetTransform(); }
    else { scale = 2.5; lastScale = 2.5; applyTransform(); }
    lbImg.style.transition = 'transform 0.3s ease';
    setTimeout(() => lbImg.style.transition = '', 300);
  });

    let mouseDown = false, mousePanStartX = 0, mousePanStartY = 0;

  lbImg.addEventListener('mousedown', e => {
    if (scale > 1) { mouseDown = true; mousePanStartX = e.clientX; mousePanStartY = e.clientY; e.preventDefault(); }
  });
  document.addEventListener('mousemove', e => {
    if (!mouseDown || scale <= 1) return;
    panX = lastPanX + (e.clientX - mousePanStartX) / scale;
    panY = lastPanY + (e.clientY - mousePanStartY) / scale;
    applyTransform();
  });
  document.addEventListener('mouseup', () => {
    if (mouseDown) { lastPanX = panX; lastPanY = panY; mouseDown = false; }
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'Escape') closeLightbox();
  });

  

  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

  window.addEventListener('load', () => {
    renderFilters();
    renderGrid();
    setTimeout(() => {
      document.getElementById('splash').classList.add('hidden');
      gallery.classList.add('visible');
    }, 1200);
  });
</script>
</body>
</html>
