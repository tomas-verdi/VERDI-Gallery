<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VERDI Gallery Organizer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f0; color: #222; }

#toolbar {
  position: sticky; top: 0; z-index: 100;
  background: #fff; border-bottom: 1px solid #ddd;
  padding: 10px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
}
#toolbar h1 { font-size: 15px; font-weight: 600; margin-right: 8px; }
.filter-btn {
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid #ccc; background: #fff; color: #555;
  font-size: 12px; cursor: pointer;
}
.filter-btn.active { background: #1D9E75; color: #fff; border-color: #1D9E75; }
#stats { margin-left: auto; font-size: 12px; color: #888; }

#grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px; padding: 16px;
}

.photo-card {
  border: 2px solid #e0e0e0; border-radius: 8px;
  overflow: hidden; cursor: grab; background: #fff;
  transition: border-color 0.15s;
  user-select: none;
}
.photo-card:hover { border-color: #aaa; }
.photo-card.dragging { opacity: 0.3; cursor: grabbing; }
.photo-card.drag-over { border-color: #1D9E75; border-style: dashed; }
.photo-card.selected { border-color: #1D9E75; box-shadow: 0 0 0 2px #1D9E7540; }

.thumb-wrap {
  width: 100%; aspect-ratio: 1; overflow: hidden;
  background: #eee; display: flex; align-items: center; justify-content: center;
  position: relative;
}
.thumb-wrap img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
.delete-btn {
  position: absolute; top: 4px; right: 4px;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(200,40,40,0.85); color: #fff;
  border: none; font-size: 13px; line-height: 1;
  cursor: pointer; display: none; align-items: center; justify-content: center;
  font-weight: bold; z-index: 10;
}
.photo-card:hover .delete-btn { display: flex; }
.video-badge {
  position: absolute; bottom: 4px; right: 4px;
  background: rgba(0,0,0,0.6); color: #fff;
  font-size: 10px; padding: 2px 6px; border-radius: 3px;
}
.num-badge {
  position: absolute; top: 4px; left: 4px;
  background: rgba(0,0,0,0.5); color: #fff;
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
}

.card-body { padding: 6px 8px 8px; }
.card-title {
  font-size: 11px; color: #666; line-height: 1.3; margin-bottom: 6px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden; min-height: 2.6em;
}

.cat-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; min-height: 20px; }
.cat-tag {
  font-size: 10px; padding: 2px 6px; border-radius: 10px; font-weight: 500;
}
.tag-General     { background:#E1F5EE; color:#0F6E56; }
.tag-Rugs        { background:#EEEDFE; color:#3C3489; }
.tag-WindowCoverings { background:#FAECE7; color:#993C1D; }
.tag-Hospitality { background:#E6F1FB; color:#0C447C; }
.tag-Art         { background:#FBEAF0; color:#72243E; }
.tag-Fashion     { background:#FAEEDA; color:#633806; }

.cat-checks { display: flex; flex-direction: column; gap: 2px; }
.cat-checks label {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: #444; cursor: pointer; padding: 1px 0;
}
.cat-checks input[type=checkbox] { cursor: pointer; accent-color: #1D9E75; }

#export-bar {
  position: sticky; bottom: 0; z-index: 100;
  background: #fff; border-top: 1px solid #ddd;
  padding: 10px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
#bulk-cat {
  font-size: 13px; padding: 6px 10px;
  border: 1px solid #ccc; border-radius: 6px; background: #fff;
}
.action-btn {
  padding: 6px 14px; font-size: 13px; border-radius: 6px;
  border: 1px solid #ccc; background: #fff; color: #333; cursor: pointer;
}
.action-btn:hover { background: #f5f5f5; }
.action-btn.primary { background: #1D9E75; color: #fff; border-color: #1D9E75; font-weight: 500; }
.action-btn.primary:hover { background: #0F6E56; }
#sel-count { font-size: 13px; color: #666; min-width: 100px; }
</style>
</head>
<body>

<div id="toolbar">
  <h1>VERDI Gallery</h1>
  <button class="filter-btn active" data-cat="All">Todas</button>
  <button class="filter-btn" data-cat="General">General</button>
  <button class="filter-btn" data-cat="Rugs">Rugs</button>
  <button class="filter-btn" data-cat="Window Coverings">Window Coverings</button>
  <button class="filter-btn" data-cat="Hospitality">Hospitality</button>
  <button class="filter-btn" data-cat="Art">Art</button>
  <button class="filter-btn" data-cat="Fashion">Fashion</button>
  <span id="stats"></span>
</div>

<div id="grid"></div>

<div id="export-bar">

  <button class="action-btn" id="select-all">Sel. todas</button>

</div>

let photos = RAW.map((p, i) => ({ ...p, _id: i, category: [].concat(p.category).filter(Boolean) }));
let selected = new Set();
let dragSrc = null;
let activeFilter = 'All';

const grid = document.getElementById('grid');
const stats = document.getElementById('stats');
const selCount = document.getElementById('sel-count');

function buildCard(p) {
  const card = document.createElement('div');
  card.className = 'photo-card' + (selected.has(p._id) ? ' selected' : '');
  card.draggable = true;

  const vid = isVideo(p.src);
  const num = p.src.match(/^(\d+)/)?.[1] || '';
  const cats = getCats(p);

  const tagsHtml = cats.length
    ? cats.map(c => `<span class="cat-tag tag-${catKey(c)}">${c}</span>`).join('')
    : '<span style="font-size:10px;color:#bbb">sin categoría</span>';

  const checksHtml = CATS.map(c => `
    <label>
      <input type="checkbox" data-cat="${c}" ${cats.includes(c) ? 'checked' : ''}>
      ${c}
    </label>`).join('');

  const thumbHtml = vid
    ? `<div style="font-size:36px;color:#999">🎬</div>`
    : `<img src="${thumbSrc(p.src)}" loading="lazy" onerror="this.style.display='none'">`;

  card.innerHTML = `
    <div class="thumb-wrap">
      ${thumbHtml}
      ${num ? `<span class="num-badge">${num}</span>` : ''}
      ${vid ? `<span class="video-badge">▶ video</span>` : ''}
      <button class="delete-btn" title="Borrar">✕</button>
    </div>
    <div class="card-body">
      <div class="cat-tags">${tagsHtml}</div>
      <div class="card-title">${p.title || p.src}</div>
      <div class="cat-checks">${checksHtml}</div>
    </div>`;

  card.querySelector('.delete-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    if (!confirm(`¿Borrar "${p.title || p.src}" del config?`)) return;
    photos = photos.filter(x => x._id !== p._id);
    selected.delete(p._id);
    updateSelCount();
    renderGrid();
  });

  card.querySelectorAll('.cat-checks input').forEach(cb => {
    cb.addEventListener('change', (e) => {
      e.stopPropagation();
      const idx = photos.findIndex(x => x._id === p._id);
      const c = e.target.dataset.cat;
      if (e.target.checked) {
        if (!photos[idx].category.includes(c)) photos[idx].category.push(c);
      } else {
        photos[idx].category = photos[idx].category.filter(x => x !== c);
      }
      const tagsEl = card.querySelector('.cat-tags');
      const newCats = getCats(photos[idx]);
      tagsEl.innerHTML = newCats.length
        ? newCats.map(c => `<span class="cat-tag tag-${catKey(c)}">${c}</span>`).join('')
        : '<span style="font-size:10px;color:#bbb">sin categoría</span>';
      updateStats();
    });
  });

  card.addEventListener('click', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
    selected.has(p._id) ? selected.delete(p._id) : selected.add(p._id);
    card.classList.toggle('selected');
    updateSelCount();
  });

  card.addEventListener('dragstart', (e) => {
    dragSrc = p._id; card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragSrc = null; });
  card.addEventListener('dragover', (e) => { e.preventDefault(); card.classList.add('drag-over'); });
  card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
  card.addEventListener('drop', (e) => {
    e.preventDefault(); card.classList.remove('drag-over');
    if (dragSrc === null || dragSrc === p._id) return;
    const fi = photos.findIndex(x => x._id === dragSrc);
    const ti = photos.findIndex(x => x._id === p._id);
    const [m] = photos.splice(fi, 1);
    photos.splice(ti, 0, m);
    renderGrid();
  });

  return card;
}

function renderGrid() {
  grid.innerHTML = '';
  const visible = activeFilter === 'All'
    ? photos
    : photos.filter(p => getCats(p).includes(activeFilter));
  visible.forEach(p => grid.appendChild(buildCard(p)));
  updateStats();
}

function updateStats() {
  const assigned = photos.filter(p => getCats(p).some(c => c !== 'General')).length;
  stats.textContent = `${assigned}/${photos.length} con categoría específica`;
}

function updateSelCount() {
  selCount.textContent = `${selected.size} seleccionada${selected.size !== 1 ? 's' : ''}`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    renderGrid();
  });
});

document.getElementById('apply-bulk').addEventListener('click', () => {
  const cat = document.getElementById('bulk-cat').value;
  if (!cat || !selected.size) return;
  selected.forEach(id => {
    const idx = photos.findIndex(p => p._id === id);
    if (idx >= 0 && !photos[idx].category.includes(cat)) photos[idx].category.push(cat);
  });
  selected.clear(); updateSelCount(); renderGrid();
});

document.getElementById('remove-bulk').addEventListener('click', () => {
  const cat = document.getElementById('bulk-cat').value;
  if (!cat || !selected.size) return;
  selected.forEach(id => {
    const idx = photos.findIndex(p => p._id === id);
    if (idx >= 0) photos[idx].category = photos[idx].category.filter(c => c !== cat);
  });
  selected.clear(); updateSelCount(); renderGrid();
});

document.getElementById('select-all').addEventListener('click', () => {
  const visible = activeFilter === 'All' ? photos : photos.filter(p => getCats(p).includes(activeFilter));
  visible.forEach(p => selected.add(p._id));
  updateSelCount(); renderGrid();
});

document.getElementById('clear-sel').addEventListener('click', () => {
  selected.clear(); updateSelCount(); renderGrid();
});

document.getElementById('export-btn').addEventListener('click', () => {
  const lines = photos.map(p => {
    const cats = getCats(p);
    const catVal = cats.length === 1 ? `"${cats[0]}"` : JSON.stringify(cats);
    return `    { src: "${p.src}", title: "${p.title}", category: ${catVal} }`;
  }).join(',\n');
  const out = `const CONFIG = {\n  photos: [\n${lines}\n  ]\n};\n`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([out], { type: 'text/javascript' }));
  a.download = 'config_new.js';
  a.click();
});

renderGrid();
</script>
